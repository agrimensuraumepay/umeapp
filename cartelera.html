<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Umepay · Cartelera</title>
<meta name="theme-color" content="#2d5a3d"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.topbar{background:#2d5a3d;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar h1{color:#e8f5e2;font-size:17px;font-weight:500;flex:1}
.btn-back{color:#9ecfb0;font-size:22px;background:none;border:none;text-decoration:none;cursor:pointer}
.content{padding:14px}
.cal{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:12px;margin-bottom:16px}
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.calhead .mes{font-size:15px;font-weight:600;color:#2d5a3d}
.calhead button{background:none;border:none;color:#2d5a3d;font-size:20px;cursor:pointer;padding:2px 8px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.wd{font-size:10px;color:#aaa;padding:3px 0;text-transform:uppercase}
.day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;border-radius:8px;cursor:default;color:#444;position:relative}
.day.empty{visibility:hidden}
.day.hoy{outline:1.5px solid #9ecfb0}
.day.ev{cursor:pointer;font-weight:600;color:#2d5a3d}
.day.ev .pt{width:5px;height:5px;border-radius:50%;background:#2e9e54;position:absolute;bottom:6px}
.day.sel{background:#2d5a3d;color:#fff}
.day.sel .pt{background:#fff}
.chips{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.chip{white-space:nowrap;border:1px solid #d3d3c8;background:#fff;color:#666;border-radius:20px;padding:6px 13px;font-size:13px;cursor:pointer}
.chip.on{background:#2d5a3d;color:#fff;border-color:#2d5a3d}
.seclabel{font-size:11px;color:#aaa;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:13px 15px;margin-bottom:9px}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:6px;color:#fff}
.ctitle{font-size:15px;font-weight:600;margin-bottom:3px}
.cmeta{font-size:12px;color:#777;margin-bottom:5px;display:flex;gap:12px;flex-wrap:wrap}
.cdesc{font-size:13px;color:#444}
.vacio{color:#aaa;font-size:13px;text-align:center;padding:18px 0}
.sel-aviso{font-size:13px;color:#2d5a3d;margin-bottom:10px;display:none;align-items:center;gap:8px}
.sel-aviso button{background:#eaf3de;border:none;color:#2d5a3d;border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer}
.fab{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2d5a3d;color:#e8f5e2;border:none;border-radius:24px;padding:13px 22px;font-size:14px;font-weight:500;box-shadow:0 3px 10px rgba(0,0,0,.2);cursor:pointer;display:flex;align-items:center;gap:7px;z-index:20}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn-back" href="index.html"><i class="ti ti-arrow-left"></i></a>
  <h1>Cartelera</h1>
</div>
<div class="content">
  <div class="cal">
    <div class="calhead">
      <button id="prev"><i class="ti ti-chevron-left"></i></button>
      <span class="mes" id="mesLabel"></span>
      <button id="next"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="calgrid" id="calgrid"></div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="sel-aviso" id="selAviso">
    <span id="selTexto"></span>
    <button id="verTodo">ver todo el mes</button>
  </div>

  <div id="lista"></div>
</div>
<button class="fab" onclick="publicar()"><i class="ti ti-plus"></i> Publicar</button>

<script>
// ===== Conexion (pegá tus links cuando los tengas) =====
const CARTELERA_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTUwGVMoPHX6q5ql-aBj1lry5ZMagncMEn0QqPrvTPSTm0MDTond8Yj8TCyVOBIbHNnxHXgTG9PXZkv/pub?gid=1672607128&single=true&output=csv';
const CARTELERA_FORM = 'https://forms.gle/Baj12EkZ9bPXE9tXA';

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WD=['L','M','M','J','V','S','D'];
const CATS={
  evento:{label:'Eventos',color:'#2e9e54'},
  clase:{label:'Clases regulares',color:'#1d6fb8'},
  terapia:{label:'Terapias',color:'#7f5bd0'},
  servicio:{label:'Servicios',color:'#1d9e8f'},
  otro:{label:'Otros',color:'#9a9e93'}
};
const ORDEN=['evento','clase','terapia','servicio','otro'];

let items=[], filtroCat='todos', diaSel=null, verMes=new Date(); verMes.setDate(1);

// ---- utilidades ----
function sinAcento(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();}
function catKey(v){v=sinAcento(v);
  if(v.includes('evento')) return 'evento';
  if(v.includes('clase'))  return 'clase';
  if(v.includes('terap'))  return 'terapia';
  if(v.includes('servic')) return 'servicio';
  return 'otro';
}
function parseFecha(s){
  if(!s) return null; s=String(s).trim(); let m;
  if(m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/)) return new Date(+m[1],+m[2]-1,+m[3]);
  if(m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/)){
    let mes=+m[1], dia=+m[2];          // formulario en MM/DD/AAAA
    if(mes>12){const t=mes;mes=dia;dia=t;}
    return new Date(+m[3], mes-1, dia);
  }
  const d=new Date(s); return isNaN(d)?null:d;
}
function fechaTxt(d){return d? d.getDate()+' '+MESES[d.getMonth()].toLowerCase():'';}
function mismaFecha(a,b){return a&&b&&a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();}

// ---- CSV ----
function parseCSV(t){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){ if(c=='"'){ if(t[i+1]=='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c=='"')q=true; else if(c==',' ){row.push(cur);cur='';}
      else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c!='\r')cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function idx(headers,...names){
  for(const n of names){const i=headers.findIndex(h=>sinAcento(h).includes(sinAcento(n)));if(i>=0)return i;}
  return -1;
}
function val(r,i){return i>=0?(r[i]||''):'';}
function desdeCSV(text){
  const rows=parseCSV(text).filter(r=>r.length>1);
  if(rows.length<2) return [];
  const h=rows[0];
  const iC=idx(h,'categoria','categoría'),
        iT=idx(h,'titular','corta','titulo','título'),
        iD=idx(h,'detallada','detalle'),
        iFa=idx(h,'facilitador'),
        iF=idx(h,'fecha'),
        iL=idx(h,'lugar'),
        iK=idx(h,'contacto');
  return rows.slice(1).map(r=>({
    categoria:val(r,iC), titulo:val(r,iT), descripcion:val(r,iD),
    facilitador:val(r,iFa), fecha:val(r,iF), hora:'',
    lugar:val(r,iL), contacto:val(r,iK)
  })).filter(x=>x.titulo);
}

// ---- render calendario ----
function render(){
  const y=verMes.getFullYear(), m=verMes.getMonth();
  document.getElementById('mesLabel').textContent=MESES[m]+' '+y;
  const primero=(new Date(y,m,1).getDay()+6)%7;  // lunes=0
  const dias=new Date(y,m+1,0).getDate();
  const hoy=new Date();
  const conEvento={};
  items.forEach(it=>{const d=parseFecha(it.fecha); if(d&&d.getFullYear()==y&&d.getMonth()==m) conEvento[d.getDate()]=true;});

  let g=WD.map(d=>`<div class="wd">${d}</div>`).join('');
  for(let i=0;i<primero;i++) g+='<div class="day empty"></div>';
  for(let d=1;d<=dias;d++){
    const fecha=new Date(y,m,d);
    const cls=['day'];
    if(conEvento[d]) cls.push('ev');
    if(mismaFecha(fecha,hoy)) cls.push('hoy');
    if(diaSel&&mismaFecha(fecha,diaSel)) cls.push('sel');
    g+=`<div class="${cls.join(' ')}" ${conEvento[d]?`onclick="selDia(${y},${m},${d})"`:''}>${d}${conEvento[d]?'<span class="pt"></span>':''}</div>`;
  }
  document.getElementById('calgrid').innerHTML=g;
  renderChips(); renderLista();
}
function selDia(y,m,d){const f=new Date(y,m,d); diaSel=mismaFecha(diaSel,f)?null:f; render();}
function verTodoMes(){diaSel=null; render();}

function renderChips(){
  const cs=[['todos','Todos'],...ORDEN.map(k=>[k,CATS[k].label])];
  document.getElementById('chips').innerHTML=cs.map(([k,l])=>
    `<span class="chip ${filtroCat==k?'on':''}" onclick="setCat('${k}')">${l}</span>`).join('');
}
function setCat(k){filtroCat=k; render();}

function tarjeta(it){
  const ck=catKey(it.categoria), cat=CATS[ck];
  const d=parseFecha(it.fecha);
  const meta=[]; if(d) meta.push('<i class="ti ti-calendar-event"></i> '+fechaTxt(d));
  if(it.hora) meta.push('<i class="ti ti-clock"></i> '+it.hora);
  if(it.lugar) meta.push('<i class="ti ti-map-pin"></i> '+it.lugar);
  const pie=[]; if(it.facilitador) pie.push('<i class="ti ti-user"></i> '+it.facilitador);
  if(it.contacto) pie.push('<i class="ti ti-phone"></i> '+it.contacto);
  return `<div class="card">
    <span class="tag" style="background:${cat.color}">${cat.label}</span>
    <div class="ctitle">${it.titulo}</div>
    ${meta.length?`<div class="cmeta">${meta.join('')}</div>`:''}
    ${it.descripcion?`<div class="cdesc">${it.descripcion}</div>`:''}
    ${pie.length?`<div class="cmeta" style="margin-top:6px">${pie.join('')}</div>`:''}
  </div>`;
}

function renderLista(){
  const av=document.getElementById('selAviso');
  let base=items.slice();
  if(diaSel){
    base=base.filter(it=>mismaFecha(parseFecha(it.fecha),diaSel));
    av.style.display='flex';
    document.getElementById('selTexto').textContent='Mostrando el '+fechaTxt(diaSel);
  } else { av.style.display='none'; }
  if(filtroCat!=='todos') base=base.filter(it=>catKey(it.categoria)===filtroCat);

  const cont=document.getElementById('lista');
  if(!base.length){cont.innerHTML='<div class="vacio">Nada por aquí todavía.</div>';return;}

  if(diaSel||filtroCat!=='todos'){
    cont.innerHTML=base.map(tarjeta).join('');
  } else {
    let html='';
    ORDEN.forEach(k=>{
      const grupo=base.filter(it=>catKey(it.categoria)===k);
      if(grupo.length) html+=`<div class="seclabel">${CATS[k].label}</div>`+grupo.map(tarjeta).join('');
    });
    cont.innerHTML=html;
  }
}

function publicar(){
  if(CARTELERA_FORM) window.open(CARTELERA_FORM,'_blank');
  else alert('Pegá el link de tu Google Form en CARTELERA_FORM para activar la publicación.');
}

// ---- init ----
async function init(){
  if(CARTELERA_CSV){
    try{ const r=await fetch(CARTELERA_CSV,{cache:'no-store'}); items=desdeCSV(await r.text()); }
    catch(e){ items=MUESTRA; }
  } else { items=MUESTRA; }
  render();
}

document.getElementById('prev').onclick=()=>{verMes.setMonth(verMes.getMonth()-1);diaSel=null;render();};
document.getElementById('next').onclick=()=>{verMes.setMonth(verMes.getMonth()+1);diaSel=null;render();};
document.getElementById('verTodo').onclick=verTodoMes;

// ---- datos de muestra (se reemplazan al conectar el CSV) ----
const MUESTRA=[
  {categoria:'Evento',titulo:'Feria de intercambio',descripcion:'Traé lo que no uses y llevate lo que necesites.',fecha:'2026-06-14',hora:'15:00',lugar:'Plaza central',contacto:'Maru'},
  {categoria:'Evento',titulo:'Cine al aire libre',descripcion:'Proyección comunitaria, traé reposera.',fecha:'2026-06-21',hora:'19:30',lugar:'Salón Aldea',contacto:'Tristán'},
  {categoria:'Evento',titulo:'Asamblea mensual',descripcion:'Orden del día abierto a la comunidad.',fecha:'2026-06-10',hora:'18:00',lugar:'Escuela Umepay',contacto:'Comisión'},
  {categoria:'Clase regular',titulo:'Yoga',descripcion:'Martes y jueves, todos los niveles.',fecha:'',hora:'09:00',lugar:'Domo',contacto:'Ceci'},
  {categoria:'Clase regular',titulo:'Huerta agroecológica',descripcion:'Sábados, práctica en la chacra.',fecha:'',hora:'10:00',lugar:'Chacra Alimento',contacto:'Vicente'},
  {categoria:'Terapia',titulo:'Masajes descontracturantes',descripcion:'Con turno previo.',fecha:'',hora:'',lugar:'Casa Colibrí',contacto:'Lau'},
  {categoria:'Terapia',titulo:'Acompañamiento terapéutico',descripcion:'Sesiones individuales.',fecha:'',hora:'',lugar:'a convenir',contacto:'Daniela'}
];

init();
</script>
</body>
</html>
